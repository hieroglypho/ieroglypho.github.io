</head>

<body>
    <div class="container">
        <!-- Workspace container with background and canvas -->
        <div id="workspaceContainer" style="position: relative;">
            <div id="backgroundContainer"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
                <img id="bgImage" style="opacity: 0.5; max-width: 100%; max-height: 100%; display: none;">
            </div>
            <canvas id="c" tabindex="0" style="position: relative; z-index: 1;"></canvas>
            <!-- Gardiner's code section -->
            <div id="pastedNamesContainer">
                <h4 style="margin: 0; display: inline-block;">Gardiner:</h4>
                <div id="pastedNames"></div>
            </div>
            <div id="fixedTextOverlay">
                ΙΕΡΟΓΛΥΦΩ 1.7
            </div>

        </div>

        <div id="searchContainer" style="position: relative;">
            <div id="paletteResizer" title="Drag to resize palette"></div>
            <input type="text" id="searchInput" placeholder="Search characters or names...">
            <div class="dropdown">
                <button id="dropdownButton">or A, B, C..</button>
                <div id="dropdownContent" class="dropdown-content">
                    <!-- Dynamic sentence links will be inserted here via JavaScript -->
                </div>
            </div>
            <div id="charListContainer">
                <div id="charList"></div>
            </div>

            <!-- Drag handle to resize the dictionary results panel -->
            <div id="resultsResizer" title="Drag to resize results panel"></div>

            <!-- Modified search section -->
            <div id="secondarySearch">
                <div class="file-upload-row">
                    <input type="file" id="dictionaryFileInput" accept=".txt" class="hidden-input">
                    <button onclick="triggerFileInput()" class="upload-button">Upload Dictionary</button>
                    <span id="fileStatus" class="file-status"></span>
                </div>
                <div class="search-row">
                    <input type="text" id="fygusSearchInput" placeholder="Search terms (e.g., A1 Z2 or rHty)"
                        class="search-input">
                    <button onclick="searchFygusFile()" class="search-button">Search</button>
                </div>
                <div id="resultDisplay" class="result-container"></div>
            </div>
            <!-- </div> -->
        </div>
    </div>

    <!-- Workspace Control Buttons -->
    <div id="tools">
        <div class="workspace-actions" style="position: relative;">
            <button id="mainMenuBtn" class="action-btn" title="File menu">≡</button>
            <div id="mainMenu" class="save-menu hidden">
                <button id="saveAsJsonBtn">Save as JSON</button>
                <button id="saveAsPngBtn">Save as PNG</button>
                <button id="saveAsSvgBtn">Save as SVG</button>
                <button id="saveAsPdfBtn">Save as PDF</button>
                <button id="loadWorkspaceBtn">Open JSON…</button>
                <button id="wikiBtn">Gardiner signs (Wiki)</button>
            </div>
        </div>
        <div class="tool-group">
            <button onclick="addCartouche()" title="Add a Cartouche">Cartouche</button>
            <button onclick="addLine()" title="Add a Line">──</button>
            <button onclick="addArrow()" title="Add an Arrow">→</button>
            <button onclick="addCustomRect()" title="Add a Rectangle">▭</button>
            <button onclick="addCircle()" title="Add a Circle">◯</button>
            <button onclick="addPencilLine()" title="Add a Freehand Line">✎</button>
            <button onclick="addSquareBracket()" title="Add bracket shape (draggable annotation)">[ ]</button>
            <button onclick="addSpeechBubble()" title="Add a Speech Bubble">💬</button>

            <input type="file" id="bgImageInput" accept="image/*" class="hidden-input">
            <button title="Enter text" onclick="openKeyboard()">⌨</button>
            <button title="Add hieroglyphs (text run, individual signs, or three-line block)" onclick="openGlyphTextDialog()">𓂀…</button>
            <button onclick="document.getElementById('bgImageInput').click()"
                title="Upload background image">BG</button>
        </div>
        <!-- Background Controls -->
        <div class="slider-controls">
            <div class="slider-group">
                <label class="slider-label" title="Background Opacity" for="bgOpacity">BG α:</label>
                <input type="range" id="bgOpacity" min="0" max="100" value="100" class="compact-slider">
                <span class="slider-value" id="opacityValue">50%</span>
            </div>

            <!-- Workspace Actions -->
            <div class="workspace-actions">
                <button id="colorPopupBtn" title="Choose canvas color" onclick="toggleColorPopup(event)">🎨</button>
                <div id="colorPopup"
                    style="display: none; position: absolute; background: white; padding: 10px; border: 1px solid black;">
                    <div style="display: flex; gap: 5px;">
                        <div class="color-swatch" style="background: #636363;" onclick="setCanvasColor('#636363')"></div>
                        <div class="color-swatch" style="background: #998b60;" onclick="setCanvasColor('#998b60')"></div>
                        <div class="color-swatch" style="background: #8F9D91;" onclick="setCanvasColor('#8F9D91')"></div>
                        <div class="color-swatch" style="background: #4F4A45;" onclick="setCanvasColor('#4F4A45')"></div>
                    </div>
                </div>
                <button id="help" class="action-btn" title="Help Documentation">𓏞</button>
            </div>
        </div>
        <!-- ======== DONATE ============ -->
        <button onclick="window.open('https://www.paypal.com/ncp/payment/PMWMHAY55RZSE', '_blank')"
            class="rainbow-donate" title="Donate!">
            <span>$:)</span>
        </button>
    </div>
    <!-- /#tools -->

    <!-- Right-click context menu for the canvas. Hidden until shown via JS. -->
    <div id="canvasCtxMenu" class="canvas-ctx-menu hidden">
        <button data-action="copy">📋 Copy image</button>
        <button data-action="png">💾 Save as PNG</button>
        <button data-action="svg">💾 Save as SVG</button>
        <button data-action="pdf">💾 Save as PDF</button>
    </div>

    <!-- Help overlay (body-level so it sits above #tools and the MdC widget) -->
    <div class="help-overlay" id="helpOverlay">
        <iframe src="help-content.html" class="help-content-frame" id="helpContent"></iframe>
    </div>

    <!-- POPUP KEYBOARD -->
        <div class="keyboard-overlay" id="keyboardOverlay"></div>
        <div class="keyboard-dialog" id="keyboardDialog">
            <div class="input-container">
                <textarea class="keyboard-input" id="keyboardInput"
                    placeholder="Type or click characters..."></textarea>
                <input type="number" id="keyboardFontSize" class="font-size-input" value="18" min="8" max="72">
            </div>

            <div class="keyboard-rows">
                <div class="keyboard-row special-chars">
                    <div class="key">ꜣ</div>
                    <div class="key">ꜥ</div>
                    <div class="key">ꞽ</div>
                    <div class="key">ḥ</div>
                    <div class="key">ḫ</div>
                    <div class="key">ẖ</div>
                    <div class="key">š</div>
                    <div class="key">ḳ</div>
                    <div class="key">ṯ</div>
                    <div class="key">ḏ</div>
                </div>
                <div class="keyboard-row special-chars">
                    <div class="key">Ꜣ</div>
                    <div class="key">Ꜥ</div>
                    <div class="key">Ꞽ</div>
                    <div class="key">Ḥ</div>
                    <div class="key">Ḫ</div>
                    <div class="key">H&#x0331;</div>
                    <div class="key">Š</div>
                    <div class="key">Ḳ</div>
                    <div class="key">Ṯ</div>
                    <div class="key">Ḏ</div>
                </div>
                <!-- Divider -->
                <div class="divider"></div>
                <div class="keyboard-row section-label">
                    <span>Leiden</span>
                </div>
                <div class="keyboard-row special-chars">
                    <div class="key" title="Lacuna (missing, restored)">[</div>
                    <div class="key" title="Lacuna close">]</div>
                    <div class="key" title="Damaged (traces remain)">⌜</div>
                    <div class="key" title="Damaged close">⌝</div>
                    <div class="key" title="Scribal omission (editor restored)">⟨</div>
                    <div class="key" title="Omission close">⟩</div>
                    <div class="key" title="Superfluous (scribal error)">{</div>
                    <div class="key" title="Superfluous close">}</div>
                    <div class="key" title="Ellipsis (untranscribed)">…</div>
                </div>
                <!-- Divider -->
                <div class="divider"></div>
                <div class="keyboard-row section-label">
                    <span>Coptic</span>
                </div>
                <div class="keyboard-row coptic-chars">
                    <div class="key">ⲁ</div>
                    <div class="key">ⲃ</div>
                    <div class="key">ⲅ</div>
                    <div class="key">ⲇ</div>
                    <div class="key">ⲉ</div>
                    <div class="key">ⲋ</div>
                    <div class="key">ⲍ</div>
                    <div class="key">ⲏ</div>
                    <div class="key">ⲑ</div>
                    <div class="key">ⲓ</div>
                </div>
                <div class="keyboard-row coptic-chars">
                    <div class="key">ⲕ</div>
                    <div class="key">ⲗ</div>
                    <div class="key">ⲙ</div>
                    <div class="key">ⲛ</div>
                    <div class="key">ⲝ</div>
                    <div class="key">ⲟ</div>
                    <div class="key">ⲡ</div>
                    <div class="key">ⲣ</div>
                    <div class="key">ⲥ</div>
                    <div class="key">ⲧ</div>
                </div>
            </div>


            <div class="dialog-buttons">
                <button class="dialog-btn cancel" onclick="closeKeyboard()">Cancel</button>
                <button class="dialog-btn add" onclick="addKeyboardText()">Add Text</button>
            </div>
        </div>

        <!-- GLYPH INPUT dialog: single Unicode IText OR individual draggable signs -->
        <div class="keyboard-overlay" id="glyphTextOverlay"></div>
        <div class="keyboard-dialog" id="glyphTextDialog">
            <div style="margin-bottom: 8px; font-size: 12px; color: #aaa; line-height: 1.4;">
                Type or paste Unicode hieroglyphs, or Gardiner codes
                (e.g. <code style="color:#ddd;">A1-D21-N35</code>).
            </div>
            <div class="input-container">
                <textarea class="keyboard-input" id="glyphTextInput"
                    placeholder="𓀀𓏏𓇋   or   A1 D21 N35"
                    style="height: 60px; font-size: 32px;"></textarea>
                <input type="number" id="glyphTextFontSize" class="font-size-input" value="60" min="12" max="200">
            </div>
            <div class="glyph-mode-row" style="display:flex; flex-direction:column; gap:6px; margin-bottom:10px; font-size:12px; color:#ddd;">
                <label style="cursor:pointer; user-select:none;">
                    <input type="radio" name="glyphMode" value="textRun" checked>
                    Single text run <span style="color:#888;">(selectable / citable)</span>
                </label>
                <label style="cursor:pointer; user-select:none;">
                    <input type="radio" name="glyphMode" value="individual">
                    Individual signs <span style="color:#888;">(draggable)</span>
                </label>
                <label style="cursor:pointer; user-select:none;">
                    <input type="radio" name="glyphMode" value="threeLine">
                    Three-line block <span style="color:#888;">(glyphs / transliteration / translation)</span>
                </label>
            </div>

            <!-- Extra rows revealed only in three-line mode. -->
            <div id="threeLineExtras" style="display:none;">
                <label class="three-line-label">Special characters
                    <span style="color:#888; text-transform:none; letter-spacing:0;">
                        — click to insert at cursor in transliteration or translation
                    </span>
                </label>
                <div id="translitPalette" class="translit-palette">
                    <div class="keyboard-row special-chars">
                        <div class="key">ꜣ</div><div class="key">ꜥ</div><div class="key">ꞽ</div>
                        <div class="key">ḥ</div><div class="key">ḫ</div><div class="key">ẖ</div>
                        <div class="key">š</div><div class="key">ḳ</div><div class="key">ṯ</div>
                        <div class="key">ḏ</div>
                    </div>
                    <div class="keyboard-row special-chars">
                        <div class="key">Ꜣ</div><div class="key">Ꜥ</div><div class="key">Ꞽ</div>
                        <div class="key">Ḥ</div><div class="key">Ḫ</div><div class="key">H&#x0331;</div>
                        <div class="key">Š</div><div class="key">Ḳ</div><div class="key">Ṯ</div>
                        <div class="key">Ḏ</div>
                    </div>
                    <div class="keyboard-row special-chars">
                        <div class="key" title="Lacuna open">[</div>
                        <div class="key" title="Lacuna close">]</div>
                        <div class="key" title="Damaged open">⌜</div>
                        <div class="key" title="Damaged close">⌝</div>
                        <div class="key" title="Editor restored open">⟨</div>
                        <div class="key" title="Editor restored close">⟩</div>
                        <div class="key" title="Superfluous open">{</div>
                        <div class="key" title="Superfluous close">}</div>
                        <div class="key" title="Ellipsis">…</div>
                    </div>
                </div>

                <label class="three-line-label">Transliteration</label>
                <textarea class="keyboard-input" id="threeLineTranslit"
                    placeholder="ꜣbḏ.w"
                    style="height:36px; font-size:18px; font-style:italic;"></textarea>

                <label class="three-line-label">Translation</label>
                <textarea class="keyboard-input" id="threeLineTranslation"
                    placeholder="Abydos"
                    style="height:36px; font-size:16px;"></textarea>
            </div>

            <div class="dialog-buttons">
                <button class="dialog-btn cancel" onclick="closeGlyphTextDialog()">Cancel</button>
                <button class="dialog-btn add" onclick="addGlyphsFromDialog()">Add</button>
            </div>
        </div>

        <script defer src="chars.js"></script>
        <script defer src="script.js"></script>
        <script defer src="fjgus.js"></script>

</body>
